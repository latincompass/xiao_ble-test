name: ZMK Build for XIAO BLE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  packages: read

jobs:
  build:
    name: Build XIAO BLE ZMK Firmware
    runs-on: ubuntu-latest
    # 使用 Zephyr 官方容器（内置 ZMK 所需的所有依赖）
    container:
      image: zmkfirmware/zmk-build-arm:latest

    steps:
      # 1. 检出代码（包含 ZMK 子模块）
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          path: workspace

      # 2. 进入工作目录并配置 West（ZMK 构建工具）
      - name: Setup West
        working-directory: workspace
        run: |
          west init -l config/
          west update
          west zephyr-export

      # 3. 编译固件（匹配你的板型配置：xiao_ble//zmk）
      - name: Build Firmware
        working-directory: workspace
        run: |
          west build -s app -b xiao_ble/zmk -- -DZMK_CONFIG=${GITHUB_WORKSPACE}/workspace/config
        env:
          # 强制生成 XIAO BLE 支持的 UF2 格式
          ZMK_OUTPUT_FORMAT: uf2

      # 4. 复制固件到宿主机器（容器内文件需导出）
      - name: Extract Firmware
        working-directory: workspace
        run: |
          mkdir -p ../firmware
          cp build/zephyr/zmk.uf2 ../firmware/
          cp build/zephyr/zmk.bin ../firmware/
          cp build/zephyr/zephyr.elf ../firmware/

      # 5. 上传固件产物
      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: xiao-ble-zmk-firmware
          path: firmware/
